<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>UNO Q - Sensors</title>
<style>
  body { font-family: system-ui, -apple-system, Arial, sans-serif; padding: 16px; }
  .box { border: 1px solid #ddd; border-radius: 12px; padding: 12px; max-width: 560px; }
  .row { display: flex; justify-content: space-between; gap: 16px; padding: 8px 0; border-bottom: 1px dashed #eee; }
  .row:last-child { border-bottom: none; }
  .k { color: #555; }
  .v { font-weight: 700; }
</style>
</head>
<body>
  <h2>UNO Q - Sensors</h2>

  <div class="box">
    <div class="row"><span class="k">Date / time</span><span class="v" id="now">-</span></div>
    <div class="row"><span class="k">Last presence</span><span class="v" id="presence">-</span></div>
    <div class="row"><span class="k">Temperature C </span><span class="v" id="tempC">-</span></div>
    <div class="row"><span class="k">Temperature F </span><span class="v" id="tempF">-</span></div>
    <div class="row"><span class="k">Humidity</span><span class="v" id="hum">-</span></div>
  </div>

<script>
function fmtLocalFromUtcIso(isoUtc) {
  if (!isoUtc) return "-";
  const d = new Date(isoUtc);
  if (isNaN(d.getTime())) return isoUtc; // fallback
  return d.toLocaleString(undefined, {
    year: "numeric",
    month: "2-digit",
    day: "2-digit",
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit",
  });
}

function fmtPresence(utcIso, mm) {
  const t = fmtLocalFromUtcIso(utcIso);
  if (t === "-") return "-";
  if (mm === null || mm === undefined) return t;
  return t + " (" + mm + " mm)";
}

async function refresh() {
  try {
    const r = await fetch("/api/state", { cache: "no-store" });
    const s = await r.json();

    document.getElementById("now").textContent =
      fmtLocalFromUtcIso(s.now_utc);

    document.getElementById("presence").textContent =
      fmtPresence(s.last_presence_utc, s.last_presence_mm);

    document.getElementById("tempC").textContent =
      (s.tempC == null) ? "-" : (s.tempC.toFixed(2) + " C");

    document.getElementById("tempF").textContent =
      (s.tempF == null) ? "-" : (s.tempF.toFixed(2) + " F");

    document.getElementById("hum").textContent =
      (s.hum == null) ? "-" : (s.hum.toFixed(2) + " %");

  } catch (e) {
    // ignore
  }
}

refresh();
setInterval(refresh, 1000);
</script>
</body>
</html>
